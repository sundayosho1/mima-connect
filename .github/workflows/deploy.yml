name: Deploy to cPanel

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        
    - name: Install Composer dependencies
      run: |
        composer install --no-dev --optimize-autoloader --ignore-platform-reqs
        
    - name: Build assets
      run: |
        npm ci
        npm run build
        
    - name: Deploy to cPanel via SSH
      uses: appleboy/scp-action@v0.1.7
      with:
        host: wghp6.wghservers.com
        username: canmpefc
        password: ${{ secrets.CPANEL_PASSWORD }}
        port: 22
        source: ".,!vendor/,!node_modules/,!.git/,!.github/,!tests/,!.env*"
        target: "/home2/canmpefc/public_html/mimaconnect.canmpef.com/"
        strip_components: 0
        overwrite: true
        
    - name: Run post-deployment commands
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: wghp6.wghservers.com
        username: canmpefc
        password: ${{ secrets.CPANEL_PASSWORD }}
        port: 22
        script: |
          cd /home2/canmpefc/public_html/mimaconnect.canmpef.com
          php /home2/canmpefc/composer install --no-dev --optimize-autoloader --ignore-platform-reqs
          php artisan migrate --force
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan storage:link
          chmod -R 755 storage bootstrap/cache
          chmod -R 775 storage/logs storage/framework
          chmod 644 .env